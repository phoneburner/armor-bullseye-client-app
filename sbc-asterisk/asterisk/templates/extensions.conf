; ───────────────────────────────────────────────────────────────────
; Dialplan for Bullseye SBC integration.
;
; The ARI Originate call lands on bullseye-landing,s — it answers the
; leg, holds for 10 seconds, then hangs up. That gives the agent enough
; time to observe the "Up" state via ARI before teardown.
; ───────────────────────────────────────────────────────────────────

[bullseye-landing]
exten => s,1,Answer()
 same => n,Wait(10)
 same => n,Hangup()

; Inbound from the SBC — we don't expect any traffic from the customer's
; SBC to land calls on us, but if it does, hang up cleanly.
[from-sbc]
exten => _X.,1,Hangup()
exten => _+X.,1,Hangup()
